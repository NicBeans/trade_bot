{% extends "base.html" %}
{% block content %}

<div class="grid-2">
    <div class="card">
        <div class="card-title">Bot Settings</div>
        <div id="settings-form" hx-get="/api/partials/settings-form" hx-trigger="load" hx-swap="innerHTML">
            <p style="color: var(--text-dim);">Loading...</p>
        </div>
        <div id="settings-status" style="margin-top: 0.75rem;"></div>
    </div>

    <div>
        <div class="card">
            <div class="card-title">Bot Controls</div>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;">
                <button class="btn btn-red" hx-post="/api/controls/stop" hx-confirm="Stop the bot?" hx-swap="none">Stop Bot</button>
                <button class="btn" hx-post="/api/controls/force-reset" hx-confirm="Force grid reset?" hx-swap="none">Force Grid Reset</button>
                <button class="btn btn-red" hx-post="/api/controls/force-sell-positions" hx-confirm="Force sell all held positions?" hx-target="#settings-status" hx-swap="innerHTML">Force Sell Positions</button>
                <button class="btn" hx-post="/api/controls/reset-pnl" hx-confirm="Reset all P&L counters to zero?" hx-target="#settings-status" hx-swap="innerHTML">Reset P&L</button>
                <button class="btn btn-red" hx-post="/api/controls/fresh-grid" hx-confirm="This will sell all positions, wipe grid state, and start fresh. Continue?" hx-target="#settings-status" hx-swap="innerHTML">Fresh Grid</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Current Configuration</div>
            <div id="config" hx-get="/api/partials/config" hx-trigger="load" hx-swap="innerHTML">
                <p style="color: var(--text-dim);">Loading...</p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
