{% extends "base.html" %}
{% block content %}

<div class="grid-2">
    <div class="card">
        <div class="card-title">Bot Configuration</div>
        <div id="config" hx-get="/api/partials/config" hx-trigger="load" hx-swap="innerHTML">
            <p style="color: var(--text-dim);">Loading...</p>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Bot Controls</div>
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;">
            <button class="btn btn-red" hx-post="/api/controls/stop" hx-confirm="Stop the bot?" hx-swap="none">Stop Bot</button>
            <button class="btn" hx-post="/api/controls/force-reset" hx-confirm="Force grid reset?" hx-swap="none">Force Grid Reset</button>
        </div>
    </div>
</div>

{% endblock %}
